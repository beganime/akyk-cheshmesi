version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: akyl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: akyl_db
      POSTGRES_USER: akyl_user
      POSTGRES_PASSWORD: akyl_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: akyl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: