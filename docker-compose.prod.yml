services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-akyl_db}
      POSTGRES_USER: ${POSTGRES_USER:-akyl_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akyl_user} -d ${POSTGRES_DB:-akyl_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["gunicorn"]
    volumes:
      - static_data:/app/var/static
      - media_data:/app/var/media
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/v1/common/health/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  celery:
    build:
      context: .
      dockerfile: Dockerfile.django
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery"]
    volumes:
      - static_data:/app/var/static
      - media_data:/app/var/media

  stream-saver:
    build:
      context: .
      dockerfile: Dockerfile.django
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["stream-saver"]
    volumes:
      - static_data:/app/var/static
      - media_data:/app/var/media

  status-saver:
    build:
      context: .
      dockerfile: Dockerfile.django
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["status-saver"]
    volumes:
      - static_data:/app/var/static
      - media_data:/app/var/media

  go-realtime:
    build:
      context: .
      dockerfile: Dockerfile.go
    restart: unless-stopped
    env_file:
      - ./env/.env.prod
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/healthz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      django:
        condition: service_healthy
      go-realtime:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - ./deploy/nginx/certbot:/var/www/certbot
      - ./deploy/nginx/ssl:/etc/letsencrypt

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data: