map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- БЛОК HTTP (порт 80) ---
# Принимает запросы на продление сертификата, а остальное перенаправляет на HTTPS
server {
    listen 80;
    server_name akyl-cheshmesi.ru www.akyl-cheshmesi.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- БЛОК HTTPS (порт 443) ---
# Основной защищенный сервер
server {
    listen 443 ssl;
    server_name akyl-cheshmesi.ru www.akyl-cheshmesi.ru;

    # Указываем пути к твоим сертификатам
    ssl_certificate /etc/letsencrypt/live/akyl-cheshmesi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akyl-cheshmesi.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 30M;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /privacy {
        root /usr/share/nginx/html;
        try_files /privacy.html =404;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
    }

    location /ws {
        proxy_pass http://go-realtime:8081;
        proxy_http_version 1.1;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}