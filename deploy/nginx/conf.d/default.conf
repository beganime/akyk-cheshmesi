map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name akyl-cheshmesi.ru www.akyl-cheshmesi.ru;

    client_max_body_size 30M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name akyl-cheshmesi.ru www.akyl-cheshmesi.ru;

    ssl_certificate /etc/letsencrypt/live/akyl-cheshmesi.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akyl-cheshmesi.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 120M;

    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /privacy {
        root /usr/share/nginx/html;
        try_files /privacy.html =404;
    }

    location = /privacy/ {
        root /usr/share/nginx/html;
        try_files /privacy.html =404;
    }

    location = /terms {
        root /usr/share/nginx/html;
        try_files /terms.html =404;
    }

    location = /terms/ {
        root /usr/share/nginx/html;
        try_files /terms.html =404;
    }

    location = /support {
        root /usr/share/nginx/html;
        try_files /support.html =404;
    }

    location = /support/ {
        root /usr/share/nginx/html;
        try_files /support.html =404;
    }

    location = /login {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

    location = /login/ {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

    location = /messenger {
        root /usr/share/nginx/html;
        try_files /messenger.html =404;
    }

    location = /messenger/ {
        root /usr/share/nginx/html;
        try_files /messenger.html =404;
    }

    location = /styles.css {
        root /usr/share/nginx/html;
        try_files /styles.css =404;
        access_log off;
        expires 7d;
    }

    location = /site.css {
        root /usr/share/nginx/html;
        try_files /site.css =404;
        access_log off;
        expires 7d;
    }

    location = /app.js {
        root /usr/share/nginx/html;
        try_files /app.js =404;
        access_log off;
        expires 7d;
    }

    location = /site.js {
        root /usr/share/nginx/html;
        try_files /site.js =404;
        access_log off;
        expires 7d;
    }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        return 404;
    }

    location /_protected_media/ {
        internal;
        alias /var/www/media/;
        access_log off;
        expires 1h;
        add_header Accept-Ranges bytes;
    }

    location /ws {
        proxy_pass http://go-realtime:8081;
        proxy_http_version 1.1;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://django:8000;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
